  document.getElementById('phaseText').textContent = t.phaseText;
  document.getElementById('countdownLabel').textContent = t.countdownLabel;
  document.getElementById('unitDays').textContent = t.units[0];
  document.getElementById('unitHours').textContent = t.units[1];
  document.getElementById('unitMinutes').textContent = t.units[2];
  document.getElementById('unitSeconds').textContent = t.units[3];
  document.getElementById('offerBadge').innerHTML = t.offerBadge(22);
  document.getElementById('sectionLabel').textContent = t.sectionLabel;
  document.getElementById('bookingTitle').textContent = t.bookingTitle;
  document.getElementById('labelName').textContent = t.labelName;
  document.getElementById('inputName').placeholder = t.placeholderName;
  document.getElementById('labelPhone').textContent = t.labelPhone;
  document.getElementById('inputPhone').placeholder = t.placeholderPhone;
  document.getElementById('labelSession').textContent = t.labelSession;
  document.getElementById('ctaText').textContent = t.ctaText;
  document.getElementById('ctaArrow').textContent = t.ctaArrow;
  document.getElementById('ctaSecondary').textContent = t.ctaSecondary;
  document.getElementById('successText').textContent = t.successText;
  document.getElementById('successSub').textContent = t.successSub;
  document.getElementById('footerLine').textContent = t.footer;

  // Session dropdown
  const sel = document.getElementById('inputSession');
  sel.innerHTML = `<option value="">${t.selectPlaceholder}</option>`;
  sessions[isAr ? 'ar' : 'en'].forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });

  // Services
  const grid = document.getElementById('servicesGrid');
  t.services.forEach(s => {
    grid.innerHTML += `<div class="service-card">
      <span class="service-icon">${s.icon}</span>
      <div class="service-name">${s.name}</div>
      <div class="service-desc">${s.desc}</div>
      ${s.badge ? `<div class="service-badge">${s.badge}</div>` : ''}
    </div>`;
  });

  // ── Countdown ──
  const endDate = new Date('2026-03-20T00:00:00');
  const totalDuration = endDate - new Date('2026-03-10T00:00:00');
  function pad(n) { return String(n).padStart(2,'0'); }

  function updateCountdown() {
    const remaining = endDate - new Date();
    if (remaining <= 0) return;
    const days    = Math.floor(remaining / (1000*60*60*24));
    const hours   = Math.floor((remaining % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((remaining % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((remaining % (1000*60)) / 1000);

    document.getElementById('offerBadge').innerHTML = t.offerBadge(days);

    [['days',days],['hours',hours],['minutes',minutes],['seconds',seconds]].forEach(([id,val]) => {
      const el = document.getElementById(id);
      const v = pad(val);
      if (el.textContent !== v) {
        el.textContent = v;
        el.classList.remove('flip');
        void el.offsetWidth;
        el.classList.add('flip');
      }
    });

    const pct = Math.min(100, ((totalDuration - remaining) / totalDuration) * 100);
    document.getElementById('urgencyFill').style.width = pct + '%';
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // ── Form Submit ──
  function submitForm() {
    const name    = document.getElementById('inputName').value.trim();
    const phone   = document.getElementById('inputPhone').value.trim();
    const session = document.getElementById('inputSession').value;

    if (!name || !phone || !session) {
      alert(t.required);
      return;
    }

    const btn = document.getElementById('ctaBtn');
    btn.disabled = true;
    document.getElementById('ctaText').textContent = isAr ? 'جاري الإرسال...' : 'Submitting...';

    const params = new URLSearchParams({ name, phone, session, lang: isAr ? 'ar' : 'en', timestamp: new Date().toLocaleString() });

    fetch(SHEET_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' })
      .then(() => {
        btn.style.display = 'none';
        document.getElementById('ctaSecondary').style.display = 'none';
        document.getElementById('successMsg').classList.add('show');
      })
      .catch(() => {
        // Even if CORS blocks — data still reaches the sheet
        btn.style.display = 'none';
        document.getElementById('ctaSecondary').style.display = 'none';
        document.getElementById('successMsg').classList.add('show');
      });
  }
</script>
</body>
</html>
